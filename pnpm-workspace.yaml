packages: []

# Hard-fail `pnpm install` when the running Node is outside package.json's `engines.node`
# (locked to Node 24 — matches `.nvmrc`). GOTCHA: on pnpm 11 the `engines` field ALONE only
# prints a warning (the docs claiming it "always fails" are wrong for this version); this switch
# is what makes it an error (`ERR_PNPM_UNSUPPORTED_ENGINE`). Verified empirically. It also enforces
# dependencies' own engine ranges — fine today (all deps allow Node 24), and a loud failure if a
# future dep needs a Node we've locked out is the behaviour we want here. Lives here, not `.npmrc`:
# pnpm 11 reads only auth/registry settings from `.npmrc`, so `engine-strict` there is a no-op.
engineStrict: true

# Let pnpm self-manage its version from package.json's `packageManager` field: when the running pnpm
# differs from the pinned version, it downloads and runs it (verifying it's a signed release first).
# Same guarantee Corepack gave, without depending on that experimental Node feature — so any global
# pnpm (v11+) converges on the repo's version. `download` is pnpm 11's DEFAULT, pinned here for
# explicitness and to survive a future default change. Replaces `managePackageManagerVersions: true`
# (removed in pnpm 11). Lives here (not `.npmrc`) for the same reason as `engineStrict` above.
pmOnFail: download

allowBuilds:
  esbuild: true
  # Cloudflare's Workers runtime, used by `wrangler dev` for local simulation.
  workerd: true
  # Pulled transitively by miniflare for image-resizing emulation we don't use; skip the
  # heavy native build. Flip to true if a Worker ever needs the Images binding locally.
  sharp: false
