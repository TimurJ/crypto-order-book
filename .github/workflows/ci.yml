name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege by default; jobs widen only if they must.
permissions:
  contents: read

# Cancel superseded runs on the same PR/branch.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint, typecheck & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6 # reads pnpm version from packageManager field
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Lint & format (Biome)
        run: pnpm biome ci # read-only; emits GitHub annotations
      - name: Typecheck & build
        run: pnpm build # tsc -b && vite build

  test:
    name: Test (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6 # reads pnpm version from packageManager field
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run tests
        run: pnpm test:run # vitest run (one-shot; CI is auto-detected too)

  secrets:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full history for gitleaks
      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  commits:
    name: Commit messages (commitlint)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # needs the PR commit range
      - uses: wagoid/commitlint-github-action@v6
