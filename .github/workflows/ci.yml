name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege by default; jobs widen only if they must.
permissions:
  contents: read

# Cancel superseded runs on the same PR/branch.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint, typecheck & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6 # reads pnpm version from packageManager field
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Worker types in sync (wrangler types)
        # Fails if wrangler.jsonc (compatibility_date) or wrangler/workerd changed without regenerating
        # worker/worker-configuration.d.ts. Runs before build — needs no build output (dist may be absent).
        run: pnpm cf-typegen:check
      - name: Lint & format (Biome)
        run: pnpm biome ci # read-only; emits GitHub annotations
      - name: Typecheck & build
        run: pnpm build # tsc -b && vite build

  test:
    name: Test (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6 # reads pnpm version from packageManager field
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run tests
        run: pnpm test:run # vitest run (one-shot; CI is auto-detected too)

  # Lint the repo's shell — the release helper (scripts/*.sh) and the Husky hooks. Nothing else gates
  # shell (Biome is ts/tsx-only; the pre-push hook runs build+test, not the scripts), so a portability
  # slip (a GNU-ism that breaks on macOS, or a bashism that breaks dash on WSL) or a syntax error in the
  # PROD-cutting release script could otherwise merge unnoticed. Checkout-only: shellcheck + bash are
  # preinstalled on ubuntu-latest, so no pnpm/node setup is needed.
  shell:
    name: Shell lint (shellcheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Syntax check (bash -n only checks its first arg, so loop)
        run: for f in scripts/*.sh; do bash -n "$f"; done
      - name: ShellCheck (bash scripts)
        run: shellcheck scripts/*.sh
      # git ls-files (not a shell glob) lists tracked hooks and skips the gitignored _/ stubs, so a
      # new hook can't slip past unlinted. Hooks are shebang-less and run under /bin/sh (dash on Linux).
      - name: ShellCheck (Husky hooks, POSIX sh)
        run: git ls-files '.husky/*' | xargs -r shellcheck --shell=sh

  secrets:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full history for gitleaks
      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  commits:
    name: Commit messages (commitlint)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # needs the PR commit range
      - uses: wagoid/commitlint-github-action@v6
