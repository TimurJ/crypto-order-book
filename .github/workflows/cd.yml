name: CD

# Continuous delivery to Cloudflare Workers across three environments.
#   PR              -> ephemeral preview Worker URL (a non-promoted version of the dev script)
#   push to main    -> build the artifact ONCE (keyed by SHA) + deploy DEV
#   tag vX.Y.Z-rc.N -> deploy UAT   (promotes the pre-built artifact for that SHA)
#   tag vX.Y.Z      -> deploy PROD  (same artifact; gated on the prod Environment's reviewer)
#
# Build-once-promote: the SPA bundle is built exactly once on the main merge and stored as the
# artifact dist-<sha>. UAT/PROD never rebuild it — they download that artifact and ship the same
# bytes. (The thin Worker in worker/ is re-bundled by wrangler from the same tagged commit; only
# the static asset bundle is promoted byte-for-byte, which is what acceptance testing signs off.)
#
# Deploys run `pnpm exec wrangler` (the lockfile-pinned devDep), not cloudflare/wrangler-action,
# to avoid version drift — mirroring the repo's `pnpm biome ci` choice over biomejs/setup-biome.
#
# Until the Cloudflare credentials exist (see README "Deployment"), the deploy/preview jobs are
# skipped via the `vars.CLOUDFLARE_ACCOUNT_ID != ''` guard, so this workflow is inert (no red X
# on PRs). It activates automatically once the repo variable + environment secrets are set.

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

# Least privilege by default; jobs widen only where they must.
permissions:
  contents: read

jobs:
  # Classify a pushed tag into a deploy channel. Tight regexes so a stray tag (e.g. v1.2 or
  # v1.2.3-beta) is `none` and deploys nothing — the trigger glob `v*` can't make this distinction.
  classify:
    name: Classify tag
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    outputs:
      channel: ${{ steps.classify.outputs.channel }}
    steps:
      - id: classify
        env:
          TAG: ${{ github.ref_name }}
        run: |
          CHANNEL=none
          if [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            CHANNEL=prod
          elif [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-rc\.[0-9]+$ ]]; then
            CHANNEL=uat
          fi
          echo "channel=$CHANNEL" >> "$GITHUB_OUTPUT"
          echo "Tag '$TAG' classified as: $CHANNEL"
      # Reject a deploy tag whose version core isn't strictly greater than the latest release
      # (catches a miscounted / lower / duplicate number before any deploy). Server-side, so it
      # can't be bypassed. Git already blocks identical tags; PROD's reviewer is the final backstop.
      - name: Enforce monotonic version
        if: steps.classify.outputs.channel != 'none'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          new_core=$(echo "$TAG" | sed -E 's/^v//; s/-rc\.[0-9]+$//')
          # gh failure must fail loudly (kept separate from the filter, which may legitimately be empty)
          tags=$(gh api "repos/${{ github.repository }}/tags" --paginate --jq '.[].name')
          # highest existing RELEASE core (vX.Y.Z, no -rc), excluding this tag; empty on first release
          baseline=$(echo "$tags" \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
            | grep -vxF "$TAG" \
            | sed -E 's/^v//' \
            | sort -V | tail -1 || true)
          if [ -z "$baseline" ]; then
            echo "No prior release to compare against — '$TAG' accepted."; exit 0
          fi
          highest=$(printf '%s\n%s\n' "$new_core" "$baseline" | sort -V | tail -1)
          if [ "$new_core" = "$baseline" ] || [ "$highest" != "$new_core" ]; then
            echo "::error::Tag '$TAG' (core $new_core) is not greater than the latest release v$baseline. Bump to a higher version and re-tag."
            exit 1
          fi
          echo "OK: $new_core > $baseline (latest release)"

  # Build the SPA bundle ONCE, on the main merge: the single source of bytes for every env.
  # Must NOT run on tags — a tag points at a commit main already built, so rebuilding would break
  # build-once and create a second artifact-producing run per SHA (the resolver expects exactly 1).
  build:
    name: Build artifact
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # mint the Sigstore OIDC token to sign the attestation
      attestations: write # persist the provenance attestation
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build # tsc -b && vite build
      # Attest SLSA build provenance for the bundle BEFORE upload, so the exact dist-<sha> bytes that
      # build-once promotes to every env carry a signed, verifiable record of which workflow + commit
      # produced them. Bare actions/attest (subject-path only) generates build provenance by default.
      - name: Attest build provenance
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: dist/**/*
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist-${{ github.sha }}
          path: dist
          retention-days: 90
          if-no-files-found: error

  # PR preview: upload a non-promoted version of the dev Worker and comment its URL on the PR.
  # Reuses the dev token (so it needs `environment: dev`). Skipped for fork PRs (no secrets) and for
  # Dependabot PRs (Dependabot runs get a read-only token + no Actions secrets, so the token-dependent
  # upload would fail — a dependency bump needs no visual preview anyway).
  preview:
    name: PR preview
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'dependabot[bot]' && vars.CLOUDFLARE_ACCOUNT_ID != ''
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write # the comment step needs write
    environment: dev
    concurrency:
      group: preview-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Upload preview version
        id: upload
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          pnpm exec wrangler versions upload --env dev 2>&1 | tee upload.log
          URL=$(grep -oE 'https://[a-z0-9.-]+\.workers\.dev' upload.log | head -1)
          echo "url=$URL" >> "$GITHUB_OUTPUT"
      - name: Comment preview URL
        if: steps.upload.outputs.url != ''
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          PREVIEW_URL: ${{ steps.upload.outputs.url }}
        with:
          script: |
            const url = process.env.PREVIEW_URL
            const marker = "<!-- cd-preview-url -->"
            const body = `${marker}\n🚀 **Preview:** ${url}\n\n_Refreshed on every push to this PR._`
            const { owner, repo } = context.repo
            const issue_number = context.issue.number
            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number })
            const existing = comments.find((c) => c.body.includes(marker))
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body })
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body })
            }

  # DEV: deploy the same-run artifact on every main merge. Like UAT/PROD it ships the stored
  # artifact (not a fresh build) so all three envs exercise the identical promotion path.
  deploy-dev:
    name: Deploy DEV
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.CLOUDFLARE_ACCOUNT_ID != ''
    runs-on: ubuntu-latest
    permissions:
      contents: read
      attestations: read # gh attestation verify (provenance)
    environment:
      name: dev
      url: https://crypto-order-book-dev.${{ vars.WORKERS_SUBDOMAIN }}.workers.dev
    concurrency:
      group: deploy-dev
      cancel-in-progress: true # the latest main wins
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Download built artifact (same run)
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist-${{ github.sha }}
          path: dist
      # Verify the downloaded artifact carries valid SLSA build provenance (from the build job) before
      # uploading/promoting — a build with any unattested file never reaches an env (item #6).
      - name: Verify build provenance
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash scripts/verify-attestation.sh dist "$GITHUB_REPOSITORY"
      # Upload a new version — this routes NO traffic yet — so we can smoke it before promoting.
      # Capture the version id (grep the `Worker Version ID:` line, so a UUID-shaped binding — e.g. a
      # future D1 database_id — can't be mistaken for it) and its preview URL. GitHub runs steps under
      # `bash -eo pipefail`, so a wrangler failure propagates through `| tee`; `grep … | head -n1 || true`
      # keeps a no-match or a stray second match from aborting/corrupting output before the empty-guards.
      - name: Upload version
        id: upload
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          pnpm exec wrangler versions upload --env dev 2>&1 | tee upload.log
          ID=$(grep -m1 -iE 'version id' upload.log | grep -oiE '[0-9a-f]{8}(-[0-9a-f]{4}){3}-[0-9a-f]{12}' | head -n1 || true)
          URL=$(grep -m1 -oE 'https://[a-z0-9.-]+\.workers\.dev' upload.log | head -n1 || true)
          [ -n "$ID" ] || { echo "::error::No Worker Version ID in versions-upload output."; exit 1; }
          [ -n "$URL" ] || { echo "::error::No preview URL in versions-upload output — are Preview URLs enabled for this Worker?"; exit 1; }
          echo "id=$ID" >> "$GITHUB_OUTPUT"
          echo "url=$URL" >> "$GITHUB_OUTPUT"
      # Gate: smoke the version's preview URL (serves no traffic) BEFORE promoting, so a broken build
      # fails here and never reaches users. scripts/smoke.sh goes past a 200 — it asserts the
      # public/_headers security headers + the SPA shell marker on the document, and nosniff + the right
      # "env" in the Worker-generated /config.js. The same script runs again post-promote (Confirm live).
      - name: Smoke test (preview URL)
        env:
          BASE: ${{ steps.upload.outputs.url }}
        run: bash scripts/smoke.sh "$BASE" dev
      # Promote the smoked version to 100% traffic. Explicit `<id>@100` + `--yes` (versions deploy is
      # interactive by default).
      - name: Promote to 100%
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          VERSION_ID: ${{ steps.upload.outputs.id }}
        run: pnpm exec wrangler versions deploy "$VERSION_ID@100" --env dev --yes
      # Confirm the live edge now serves the promoted version (real URL / routing a preview URL can't
      # show) — same deepened assertions as the preview smoke, against the live env.
      - name: Confirm live
        run: bash scripts/smoke.sh "https://crypto-order-book-dev.${{ vars.WORKERS_SUBDOMAIN }}.workers.dev" dev

  # UAT: triggered by an rc tag. Promotes the artifact the main build produced for this SHA.
  deploy-uat:
    name: Deploy UAT
    needs: classify
    if: needs.classify.outputs.channel == 'uat' && vars.CLOUDFLARE_ACCOUNT_ID != ''
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read # look up + download the cross-run build artifact
      attestations: read # gh attestation verify (provenance)
    environment:
      name: uat
      url: https://crypto-order-book-uat.${{ vars.WORKERS_SUBDOMAIN }}.workers.dev
    concurrency:
      group: deploy-uat
      cancel-in-progress: false # don't interrupt a release deploy
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Resolve the main build run for this commit
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RUNS=$(gh run list --workflow cd.yml --commit "$GITHUB_SHA" --branch main --limit 100 \
            --json databaseId,conclusion,status \
            --jq '[.[] | select(.status=="completed" and .conclusion=="success") | .databaseId]')
          COUNT=$(echo "$RUNS" | jq 'length')
          if [[ "$COUNT" -ne 1 ]]; then
            echo "::error::Expected exactly 1 successful main build run for $GITHUB_SHA, found $COUNT. Only tag a commit that landed on main and finished its CD build (the artifact may also have aged out past retention)."
            exit 1
          fi
          echo "run_id=$(echo "$RUNS" | jq -r '.[0]')" >> "$GITHUB_OUTPUT"
      - name: Download the pre-built artifact (build-once)
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist-${{ github.sha }}
          path: dist
          run-id: ${{ steps.resolve.outputs.run_id }}
          github-token: ${{ github.token }}
      # Verify build provenance — same gate as DEV (see comments there).
      - name: Verify build provenance
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash scripts/verify-attestation.sh dist "$GITHUB_REPOSITORY"
      # Same gate as DEV (see comments there): upload → smoke the preview URL → promote → confirm live.
      - name: Upload version
        id: upload
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          pnpm exec wrangler versions upload --env uat 2>&1 | tee upload.log
          ID=$(grep -m1 -iE 'version id' upload.log | grep -oiE '[0-9a-f]{8}(-[0-9a-f]{4}){3}-[0-9a-f]{12}' | head -n1 || true)
          URL=$(grep -m1 -oE 'https://[a-z0-9.-]+\.workers\.dev' upload.log | head -n1 || true)
          [ -n "$ID" ] || { echo "::error::No Worker Version ID in versions-upload output."; exit 1; }
          [ -n "$URL" ] || { echo "::error::No preview URL in versions-upload output — are Preview URLs enabled for this Worker?"; exit 1; }
          echo "id=$ID" >> "$GITHUB_OUTPUT"
          echo "url=$URL" >> "$GITHUB_OUTPUT"
      - name: Smoke test (preview URL)
        env:
          BASE: ${{ steps.upload.outputs.url }}
        run: bash scripts/smoke.sh "$BASE" uat
      - name: Promote to 100%
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          VERSION_ID: ${{ steps.upload.outputs.id }}
        run: pnpm exec wrangler versions deploy "$VERSION_ID@100" --env uat --yes
      - name: Confirm live
        run: bash scripts/smoke.sh "https://crypto-order-book-uat.${{ vars.WORKERS_SUBDOMAIN }}.workers.dev" uat

  # PROD: triggered by a release tag. Same cross-run artifact; gated on the prod Environment's
  # required reviewer (approval precedes upload/smoke/promote). Traffic is gated behind the smoke —
  # upload a version, smoke its preview URL, then promote to 100%. Rollback stays manual
  # (`wrangler rollback`); gradual/canary rollout is a documented later step.
  deploy-prod:
    name: Deploy PROD
    needs: classify
    if: needs.classify.outputs.channel == 'prod' && vars.CLOUDFLARE_ACCOUNT_ID != ''
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      attestations: read # gh attestation verify (provenance)
    environment:
      name: prod
      url: https://crypto-order-book-prod.${{ vars.WORKERS_SUBDOMAIN }}.workers.dev
    concurrency:
      group: deploy-prod
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Resolve the main build run for this commit
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RUNS=$(gh run list --workflow cd.yml --commit "$GITHUB_SHA" --branch main --limit 100 \
            --json databaseId,conclusion,status \
            --jq '[.[] | select(.status=="completed" and .conclusion=="success") | .databaseId]')
          COUNT=$(echo "$RUNS" | jq 'length')
          if [[ "$COUNT" -ne 1 ]]; then
            echo "::error::Expected exactly 1 successful main build run for $GITHUB_SHA, found $COUNT. Only tag a commit that landed on main and finished its CD build (the artifact may also have aged out past retention)."
            exit 1
          fi
          echo "run_id=$(echo "$RUNS" | jq -r '.[0]')" >> "$GITHUB_OUTPUT"
      - name: Download the pre-built artifact (build-once)
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist-${{ github.sha }}
          path: dist
          run-id: ${{ steps.resolve.outputs.run_id }}
          github-token: ${{ github.token }}
      # Verify build provenance — same gate as DEV (see comments there).
      - name: Verify build provenance
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash scripts/verify-attestation.sh dist "$GITHUB_REPOSITORY"
      # Same gate as DEV (see comments there): upload → smoke the preview URL → promote → confirm live.
      - name: Upload version
        id: upload
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          pnpm exec wrangler versions upload --env prod 2>&1 | tee upload.log
          ID=$(grep -m1 -iE 'version id' upload.log | grep -oiE '[0-9a-f]{8}(-[0-9a-f]{4}){3}-[0-9a-f]{12}' | head -n1 || true)
          URL=$(grep -m1 -oE 'https://[a-z0-9.-]+\.workers\.dev' upload.log | head -n1 || true)
          [ -n "$ID" ] || { echo "::error::No Worker Version ID in versions-upload output."; exit 1; }
          [ -n "$URL" ] || { echo "::error::No preview URL in versions-upload output — are Preview URLs enabled for this Worker?"; exit 1; }
          echo "id=$ID" >> "$GITHUB_OUTPUT"
          echo "url=$URL" >> "$GITHUB_OUTPUT"
      - name: Smoke test (preview URL)
        env:
          BASE: ${{ steps.upload.outputs.url }}
        run: bash scripts/smoke.sh "$BASE" prod
      - name: Promote to 100%
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          VERSION_ID: ${{ steps.upload.outputs.id }}
        run: pnpm exec wrangler versions deploy "$VERSION_ID@100" --env prod --yes
      - name: Confirm live
        run: bash scripts/smoke.sh "https://crypto-order-book-prod.${{ vars.WORKERS_SUBDOMAIN }}.workers.dev" prod
