<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" sizes="any" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crypto Order Book</title>
    <meta
      name="description"
      content="Real-time cryptocurrency order-book viewer — live bid/ask depth."
    />

    <!-- Browser UI chrome color, per OS color scheme (light #ffffff / dark #090b0c,
         from the --background OKLch tokens in src/index.css). Follows the OS scheme,
         not the app's manual theme toggle. -->
    <meta
      name="theme-color"
      media="(prefers-color-scheme: light)"
      content="#ffffff"
    />
    <meta
      name="theme-color"
      media="(prefers-color-scheme: dark)"
      content="#090b0c"
    />

    <!-- Open Graph / Twitter (text-only; og:image + og:url deferred until a
         canonical domain and share image exist — see PRODUCTION-READINESS.md #7). -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Crypto Order Book" />
    <meta property="og:title" content="Crypto Order Book" />
    <meta
      property="og:description"
      content="Real-time cryptocurrency order-book viewer — live bid/ask depth."
    />
    <!-- twitter:card only — X falls back to og:title/og:description for the rest. -->
    <meta name="twitter:card" content="summary" />
    <!-- A <script src="/config.js"> carrying per-environment runtime config
         (window.__APP_CONFIG__) is injected here by the runtime-config Vite plugin
         (vite.config.ts) so it's never bundled. It's served by the Cloudflare Worker in
         deployed envs and by Vite in `pnpm dev`, and runs before the app module. -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
